name: Nightly DAST / Pentest Regression

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC nightly
  workflow_dispatch: # allow manual trigger

env:
  SCAN_TIMESTAMP: "" # set in job step
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dast-scan:
    name: DAST Regression Scan
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set scan timestamp
        run: |
          set -euo pipefail
          echo "SCAN_TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_ENV"

      - name: Create artifact directories
        run: |
          set -euo pipefail
          mkdir -p artifacts/raw/zap
          mkdir -p artifacts/raw/nuclei
          mkdir -p artifacts/raw/katana
          mkdir -p artifacts/raw/ffuf
          mkdir -p artifacts/raw/newman
          mkdir -p artifacts/final
          mkdir -p artifacts/logs
          # Set open permissions so ZAP Docker container (uid 1000) can write to all dirs
          chmod -R 777 artifacts/
          echo "[INFO] Artifact directories created with open permissions."

      # ── Tool installation ─────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            jq curl python3-pip wkhtmltopdf \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev shared-mime-info \
            fonts-liberation fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          pip install -q requests jinja2 weasyprint

      - name: Set up Node.js (Playwright + Newman)
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          npm install -g @playwright/test newman
          npx playwright install chromium --with-deps

      - name: Install Go-based tools (Nuclei, Katana, ffuf)
        uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          cache: false

      - name: Install Nuclei
        run: go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
        env:
          GOFLAGS: "-mod=mod"
          GOTOOLCHAIN: "local"

      - name: Install Katana
        run: go install -v github.com/projectdiscovery/katana/cmd/katana@latest
        env:
          GOFLAGS: "-mod=mod"
          GOTOOLCHAIN: "local"

      - name: Install ffuf
        run: go install -v github.com/ffuf/ffuf/v2@latest
        env:
          GOFLAGS: "-mod=mod"
          GOTOOLCHAIN: "local"

      - name: Pull OWASP ZAP Docker image
        run: |
          set -euo pipefail
          docker pull ghcr.io/zaproxy/zaproxy:stable

      # ── Pre-flight ────────────────────────────────────────────────────────────
      - name: Validate target reachability
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          PREFLIGHT_TIMEOUT: ${{ vars.PREFLIGHT_TIMEOUT || '10' }}
        run: |
          set -euo pipefail
          bash scripts/preflight.sh 2>&1 | tee artifacts/logs/preflight.log

      # ── Auth bootstrap (optional) ─────────────────────────────────────────────
      - name: Auth bootstrap (Playwright)
        if: ${{ vars.AUTH_ENABLED == 'true' }}
        env:
          AUTH_URL: ${{ vars.AUTH_URL }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          AUTH_USERNAME_SELECTOR: ${{ vars.AUTH_USERNAME_SELECTOR || '#username' }}
          AUTH_PASSWORD_SELECTOR: ${{ vars.AUTH_PASSWORD_SELECTOR || '#password' }}
          AUTH_SUBMIT_SELECTOR: ${{ vars.AUTH_SUBMIT_SELECTOR || '[type=submit]' }}
          SESSION_COOKIE_NAME: ${{ vars.SESSION_COOKIE_NAME || 'session' }}
        run: |
          set -euo pipefail
          node scripts/auth-bootstrap.js 2>&1 | tee artifacts/logs/auth-bootstrap.log

      # ── Discovery ─────────────────────────────────────────────────────────────
      - name: Endpoint discovery (Katana)
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          KATANA_DEPTH: ${{ vars.KATANA_DEPTH || '3' }}
        # scan tools use || true intentionally — a scan finding nothing is not a pipeline error
        run: |
          set -euo pipefail
          for url in $(echo "$TARGET_URLS" | tr ',' '\n'); do
            safe=$(echo "$url" | sed 's|[^a-zA-Z0-9]|_|g')
            ~/go/bin/katana \
              -u "$url" \
              -d "$KATANA_DEPTH" \
              -jc \
              -o "artifacts/raw/katana/${safe}.txt" \
              -silent 2>&1 | tee -a artifacts/logs/katana.log || true
          done

      - name: Forced browsing (ffuf)
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          FFUF_WORDLIST: ${{ vars.FFUF_WORDLIST || 'configs/ffuf-wordlist-small.txt' }}
          FFUF_RATE: ${{ vars.FFUF_RATE || '50' }}
        run: |
          set -euo pipefail
          for url in $(echo "$TARGET_URLS" | tr ',' '\n'); do
            safe=$(echo "$url" | sed 's|[^a-zA-Z0-9]|_|g')
            ~/go/bin/ffuf \
              -u "${url}/FUZZ" \
              -w "$FFUF_WORDLIST" \
              -rate "$FFUF_RATE" \
              -mc 200,201,204,301,302,403 \
              -o "artifacts/raw/ffuf/${safe}.json" \
              -of json \
              -s 2>&1 | tee -a artifacts/logs/ffuf.log || true
          done

      # ── Newman API workflow (optional) ────────────────────────────────────────
      - name: Newman API workflow
        if: ${{ vars.NEWMAN_COLLECTION != '' }}
        env:
          NEWMAN_COLLECTION: ${{ vars.NEWMAN_COLLECTION }}
          NEWMAN_ENV_FILE: ${{ vars.NEWMAN_ENV_FILE || '' }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          set -euo pipefail
          ENV_FLAG=""
          [ -n "$NEWMAN_ENV_FILE" ] && ENV_FLAG="-e $NEWMAN_ENV_FILE"
          newman run "$NEWMAN_COLLECTION" $ENV_FLAG \
            --reporters cli,json \
            --reporter-json-export artifacts/raw/newman/newman-report.json \
            2>&1 | tee artifacts/logs/newman.log || true

      # ── OWASP ZAP DAST ────────────────────────────────────────────────────────
      - name: OWASP ZAP unauthenticated scan
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          ZAP_AJAX_SPIDER: ${{ vars.ZAP_AJAX_SPIDER || 'false' }}
        run: |
          set -euo pipefail
          FIRST_URL=$(echo "$TARGET_URLS" | tr ',' '\n' | head -1)
          # Fix permissions so ZAP container (runs as uid 1000) can write reports
          mkdir -p artifacts/raw/zap
          chmod 777 artifacts/raw/zap
          docker run --rm \
            -v "$(pwd)/artifacts/raw/zap:/zap/wrk:rw" \
            -v "$(pwd)/configs/zap-config.yaml:/zap/config.yaml:ro" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t "$FIRST_URL" \
              -c /zap/config.yaml \
              -J /zap/wrk/zap-report.json \
              -r /zap/wrk/zap-report.html \
              -x /zap/wrk/zap-report.xml \
              -I \
              2>&1 | tee artifacts/logs/zap.log || true
          echo "--- ZAP output files ---"
          ls -lh artifacts/raw/zap/ || echo "No ZAP output files produced"
          echo "--- ZAP log tail ---"
          tail -20 artifacts/logs/zap.log || true
          echo "--- ZAP JSON structure check ---"
          if [ -f "artifacts/raw/zap/zap-report.json" ]; then
            echo "[OK] zap-report.json exists ($(wc -c < artifacts/raw/zap/zap-report.json) bytes)"
            jq '{sites: (.site | length), alerts: (.site[0].alerts | length)}' \
              artifacts/raw/zap/zap-report.json 2>/dev/null || \
            jq 'keys' artifacts/raw/zap/zap-report.json 2>/dev/null || \
            echo "[WARN] Could not parse zap-report.json structure"
          else
            echo "[WARN] zap-report.json was NOT created"
          fi

      - name: OWASP ZAP authenticated scan
        if: ${{ vars.AUTH_ENABLED == 'true' }}
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          ZAP_AUTH_SCRIPT: ${{ vars.ZAP_AUTH_SCRIPT || '' }}
        run: |
          set -euo pipefail
          FIRST_URL=$(echo "$TARGET_URLS" | tr ',' '\n' | head -1)
          # Fix permissions so ZAP container (runs as uid 1000) can write reports
          mkdir -p artifacts/raw/zap
          chmod 777 artifacts/raw/zap
          if [ -f /tmp/zap-session.txt ]; then
            echo "[INFO] Using session from auth bootstrap."
          fi
          docker run --rm \
            -v "$(pwd)/artifacts/raw/zap:/zap/wrk:rw" \
            -v "$(pwd)/configs/zap-config.yaml:/zap/config.yaml:ro" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t "$FIRST_URL" \
              -c /zap/config.yaml \
              -J /zap/wrk/zap-auth-report.json \
              -r /zap/wrk/zap-auth-report.html \
              -I \
              2>&1 | tee artifacts/logs/zap-auth.log || true

      # ── ZAP diagnostic (runs when ZAP produces no reports) ───────────────────
      - name: ZAP scan diagnosis
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
        run: |
          set -euo pipefail
          FIRST_URL=$(echo "$TARGET_URLS" | tr ',' '\n' | head -1)
          mkdir -p artifacts/final
          python3 scripts/zap-diagnose.py \
            --zap-log artifacts/logs/zap.log \
            --zap-dir artifacts/raw/zap \
            --summary artifacts/final/summary.json \
            --target "$FIRST_URL" \
            2>&1 | tee artifacts/logs/zap-diagnose.log || true

      # ── Nuclei supplemental scan ──────────────────────────────────────────────
      - name: Update Nuclei templates
        run: ~/go/bin/nuclei -update-templates -silent 2>&1 | tee artifacts/logs/nuclei-update.log || true

      - name: Nuclei security regression scan
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          NUCLEI_TAGS: ${{ vars.NUCLEI_TAGS || 'cve,ssrf,xss,sqli,rce,misconfig,exposure,headers,session' }}
          NUCLEI_SEVERITY: ${{ vars.NUCLEI_SEVERITY || 'medium,high,critical' }}
          NUCLEI_RATE: ${{ vars.NUCLEI_RATE || '50' }}
        run: |
          set -euo pipefail
          TARGETS_FILE=$(mktemp)
          echo "$TARGET_URLS" | tr ',' '\n' > "$TARGETS_FILE"
          ~/go/bin/nuclei \
            -l "$TARGETS_FILE" \
            -tags "$NUCLEI_TAGS" \
            -severity "$NUCLEI_SEVERITY" \
            -rl "$NUCLEI_RATE" \
            -json-export artifacts/raw/nuclei/nuclei-report.json \
            -o artifacts/raw/nuclei/nuclei-report.txt \
            -silent \
            2>&1 | tee artifacts/logs/nuclei.log || true
          rm -f "$TARGETS_FILE"

      # ── Debug: show what raw scan outputs were produced ───────────────────────
      - name: Debug — list artifact tree
        if: always()
        run: ls -R artifacts || true

      # ── Validate raw scan outputs exist ───────────────────────────────────────
      - name: Validate raw scan outputs
        run: |
          set -euo pipefail
          MISSING=0
          for f in \
            artifacts/raw/zap/zap-report.json \
            artifacts/raw/nuclei/nuclei-report.json; do
            if [ ! -f "$f" ]; then
              echo "[WARN] Expected scan output not found: $f"
              MISSING=$((MISSING + 1))
            else
              echo "[OK] $f ($(wc -c < "$f") bytes)"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "[WARN] $MISSING raw scan output(s) missing — pipeline will use fallback summary."
          fi

      # ── Report generation ─────────────────────────────────────────────────────
      - name: Normalize and consolidate reports (summary.json)
        env:
          SCAN_TIMESTAMP: ${{ env.SCAN_TIMESTAMP }}
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT || 'non-production' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/final
          python3 scripts/normalize-reports.py \
            --zap-report artifacts/raw/zap/zap-report.json \
            --zap-auth-report artifacts/raw/zap/zap-auth-report.json \
            --nuclei-report artifacts/raw/nuclei/nuclei-report.json \
            --ffuf-dir artifacts/raw/ffuf \
            --katana-dir artifacts/raw/katana \
            --output artifacts/final/summary.json \
            --timestamp "$SCAN_TIMESTAMP" \
            --targets "$TARGET_URLS" \
            --environment "$ENVIRONMENT" \
            2>&1 | tee artifacts/logs/normalize.log || true
          # Fallback: write empty summary if normalizer crashed or produced nothing
          if [ ! -f "artifacts/final/summary.json" ]; then
            echo "[WARN] normalize-reports.py did not produce summary.json — running fallback"
            python3 scripts/fallback-summary.py \
              "artifacts/final/summary.json" \
              "$SCAN_TIMESTAMP" \
              "$TARGET_URLS" \
              "$ENVIRONMENT" \
              2>&1 | tee -a artifacts/logs/normalize.log
          fi

      - name: Validate summary.json exists before PDF generation
        run: |
          set -euo pipefail
          if [ ! -f "artifacts/final/summary.json" ]; then
            echo "[ERROR] summary.json was not created by normalize or fallback steps."
            echo "[ERROR] Check artifacts/logs/normalize.log for details."
            exit 1
          fi
          SIZE=$(wc -c < "artifacts/final/summary.json")
          echo "[INFO] summary.json found (${SIZE} bytes) — proceeding to PDF generation."
          # Validate it is parseable JSON
          if ! jq empty artifacts/final/summary.json 2>/dev/null; then
            echo "[ERROR] summary.json exists but is not valid JSON."
            exit 1
          fi
          echo "[INFO] summary.json is valid JSON."

      - name: Generate PDF summary report
        env:
          SCAN_TIMESTAMP: ${{ env.SCAN_TIMESTAMP }}
        run: |
          set -euo pipefail
          python3 scripts/generate-pdf.py \
            --input artifacts/final/summary.json \
            --output artifacts/final/summary.pdf \
            2>&1 | tee artifacts/logs/pdf-gen.log
        continue-on-error: true

      # ── Debug: confirm final outputs before upload ────────────────────────────
      - name: Debug — confirm final outputs
        if: always()
        run: |
          echo "=== artifacts/final ==="
          ls -lh artifacts/final || true
          echo "=== artifacts/logs ==="
          ls -lh artifacts/logs || true

      # ── Validate final artifacts before S3 upload ────────────────────────────
      - name: Validate final artifacts before S3 upload
        run: |
          set -euo pipefail
          FAILED=0

          echo "[INFO] Checking required final artifacts..."

          if [ ! -f "artifacts/final/summary.json" ]; then
            echo "[ERROR] Missing: artifacts/final/summary.json"
            FAILED=$((FAILED + 1))
          else
            SIZE=$(wc -c < "artifacts/final/summary.json")
            if [ "$SIZE" -lt 10 ]; then
              echo "[ERROR] artifacts/final/summary.json exists but is empty or too small (${SIZE} bytes)"
              FAILED=$((FAILED + 1))
            else
              # Confirm it is valid JSON
              if ! jq empty artifacts/final/summary.json 2>/dev/null; then
                echo "[ERROR] artifacts/final/summary.json is not valid JSON"
                FAILED=$((FAILED + 1))
              else
                echo "[OK] artifacts/final/summary.json (${SIZE} bytes, valid JSON)"
              fi
            fi
          fi

          if [ ! -f "artifacts/final/summary.pdf" ]; then
            echo "[WARN] Missing: artifacts/final/summary.pdf — PDF generation may have failed"
            echo "[INFO] Pipeline will continue and upload available artifacts."
          else
            SIZE=$(wc -c < "artifacts/final/summary.pdf")
            echo "[OK] artifacts/final/summary.pdf (${SIZE} bytes)"
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "[ERROR] $FAILED critical artifact(s) missing or invalid. Aborting S3 upload."
            exit 1
          fi

          echo "[INFO] Artifact validation passed — proceeding to S3 upload."

      # ── S3 upload ─────────────────────────────────────────────────────────────
      - name: Upload artifacts to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          SCAN_TIMESTAMP: ${{ env.SCAN_TIMESTAMP }}
        run: |
          set -euo pipefail
          bash scripts/upload-s3.sh 2>&1 | tee artifacts/logs/s3-upload.log

      - name: Verify S3 upload succeeded
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          SCAN_TIMESTAMP: ${{ env.SCAN_TIMESTAMP }}
        run: |
          set -euo pipefail
          echo "=================================================="
          echo " S3 Artifact Report — dast/${SCAN_TIMESTAMP}/"
          echo "=================================================="
          echo ""

          # Print every file with size, date and storage class
          aws s3api list-objects-v2 \
            --bucket "$S3_BUCKET" \
            --prefix "dast/${SCAN_TIMESTAMP}/" \
            --query "Contents[].{File:Key, Size:Size, LastModified:LastModified, StorageClass:StorageClass}" \
            --output table 2>/dev/null || true

          echo ""
          echo "--- Critical file check ---"
          MISSING=0
          for key in \
            "dast/${SCAN_TIMESTAMP}/final/summary.json" \
            "dast/${SCAN_TIMESTAMP}/final/summary.pdf"; do
            if aws s3api head-object --bucket "$S3_BUCKET" --key "$key" > /dev/null 2>&1; then
              SIZE=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$key" \
                --query 'ContentLength' --output text)
              MODIFIED=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$key" \
                --query 'LastModified' --output text)
              echo "[OK] s3://${S3_BUCKET}/${key}"
              echo "     Size: ${SIZE} bytes | Last Modified: ${MODIFIED}"
            else
              echo "[WARN] Not found: s3://${S3_BUCKET}/${key}"
              MISSING=$((MISSING + 1))
            fi
          done
          echo ""
          if [ "$MISSING" -eq 0 ]; then
            echo "[INFO] All critical files confirmed in S3."
          else
            echo "[WARN] $MISSING file(s) missing from S3."
          fi
          echo "=================================================="

      # ── Slack notification ────────────────────────────────────────────────────
      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SCAN_TIMESTAMP: ${{ env.SCAN_TIMESTAMP }}
          TARGET_URLS: ${{ vars.TARGET_URLS }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT || 'non-production' }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          JOB_STATUS: ${{ job.status }}
        run: bash scripts/slack-notify.sh 2>&1 | tee artifacts/logs/slack.log

      # ── Upload GitHub Actions artifacts ───────────────────────────────────────
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dast-artifacts-${{ env.SCAN_TIMESTAMP }}
          path: artifacts/
          retention-days: 30
